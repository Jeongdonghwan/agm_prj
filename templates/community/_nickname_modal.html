<!-- 닉네임 설정 모달 (§4-2 — 커뮤니티 이용 조건) -->
<div class="nick-modal-bg" id="nick-modal">
  <div class="nick-modal">
    <h3>닉네임을 설정해주세요</h3>
    <p>커뮤니티 글/댓글 작성에는 닉네임이 필요해요.<br>2~10자의 한글/영문/숫자, 설정 후 변경은 30일에 1회 가능합니다.</p>
    <input type="text" id="nick-input" maxlength="10" placeholder="닉네임 입력">
    <div class="check-msg" id="nick-msg"></div>
    <div class="btns">
      <button type="button" class="close" id="nick-close">나중에</button>
      <button type="button" class="save" id="nick-save" disabled>설정 완료</button>
    </div>
  </div>
</div>
