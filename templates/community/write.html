{% extends "base.html" %}

{% block title %}글쓰기 - 커뮤니티 | {{ site_name }}{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/community.css') }}">
{% endblock %}

{% block content %}
<div class="comm-form">
  <h1>커뮤니티 글쓰기</h1>
  <form method="post" enctype="multipart/form-data" {% if nickname_required %}data-need-nickname="1"{% endif %}>
    <div class="field">
      <label>게시판</label>
      <select id="board-select">
        {% for key, b in boards.items() %}
        <option value="{{ key }}" {% if key == default_board %}selected{% endif %}>{{ b.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" id="topic-field">
      <label>세부 주제</label>
      <select name="category" id="topic-select" required></select>
    </div>
    <div class="field">
      <label>제목</label>
      <input type="text" name="title" required maxlength="200" value="{{ form.get('title', '') }}">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea name="content" rows="10" required placeholder="전화번호·주민등록번호는 자동으로 가려집니다.">{{ form.get('content', '') }}</textarea>
    </div>
    <div class="field">
      <label>파일 첨부 <small style="font-weight:500;color:var(--ink-500)">(최대 5개 — pdf, hwp, doc, xls, txt, 이미지, zip / 10MB)</small></label>
      <input type="file" name="attachments" multiple accept=".pdf,.hwp,.hwpx,.doc,.docx,.xls,.xlsx,.txt,.jpg,.jpeg,.png,.zip">
    </div>
    <div class="field">
      <label class="anon"><input type="checkbox" name="is_anonymous" value="1" {% if form.get('is_anonymous') %}checked{% endif %}> 익명으로 작성</label>
    </div>
    <button class="submit" type="submit">등록하기</button>
  </form>
</div>

{% include "community/_nickname_modal.html" %}
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/nickname-modal.js') }}"></script>
<script>
// 게시판 → 세부 주제 종속 선택
const BOARDS = {{ boards | tojson }};
const boardSel = document.getElementById('board-select');
const topicSel = document.getElementById('topic-select');
const topicField = document.getElementById('topic-field');
const prev = {{ form.get('category') | tojson }};
function fillTopics() {
  const b = BOARDS[boardSel.value];
  const opts = b.topics.length ? b.topics : [b.label];
  topicSel.innerHTML = opts.map(t => `<option value="${t}"${t === prev ? ' selected' : ''}>${t}</option>`).join('');
  topicField.style.display = b.topics.length ? '' : 'none';
}
boardSel.addEventListener('change', fillTopics);
fillTopics();
</script>
{% endblock %}
