<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 - {{ site_name }}</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="{{ url_for('static', filename='js/lucide.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/auth.css') }}">
</head>
<body class="admin-login">
<div class="auth-card">
  <div style="display:flex;justify-content:center;margin-bottom:14px">
    <span style="width:44px;height:44px;background:var(--blue-900);color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center"><i data-lucide="shield-check" style="width:22px;height:22px"></i></span>
  </div>
  <h1 class="auth-title">총관리자 로그인</h1>
  <p class="auth-sub">{{ site_name }} 운영 관리 시스템</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="flash {{ category }}" style="margin-top:14px">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form class="auth-form" method="post">
    <div>
      <label>관리자 이메일</label>
      <input type="email" name="email" required autofocus>
    </div>
    <div>
      <label>비밀번호</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn-submit" type="submit">로그인</button>
  </form>
  <div class="info-box" style="margin-top:16px">
    <b>데모 관리자 계정</b><br>
    admin@angimo.kr / angimo-admin-1234
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
